name: São Silvestre 2026 — Monitor de Inscrições

on:
  schedule:
    - cron: "0 11 * 1-9 *"
    - cron: "*/5 * * 10-12 *"
  workflow_dispatch:
    inputs:
      send_heartbeat:
        description: "Enviar email de heartbeat (true/false)"
        required: false
        default: "false"

jobs:
  monitor:
    name: Verificar inscrições
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar monitor
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:     ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          SEND_HEARTBEAT: ${{ github.event.inputs.send_heartbeat || 'false' }}
        run: python monitor.py
